<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouicrypto | Reward Verification System</title>
    
    <script src="https://5gvci.com/act/files/tag.min.js?z=10851632" data-cfasync="false" async></script>

    <script>(function(s){s.dataset.zone='10851638',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .glass-effect { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .disabled-btn { pointer-events: none; opacity: 0.5; filter: grayscale(1); }
        .pulse-animation { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <div class="absolute inset-0 z-0">
        <div class="absolute top-[-10%] left-[-10%] w-80 h-80 bg-blue-900 rounded-full blur-[120px] opacity-40"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-80 h-80 bg-emerald-900 rounded-full blur-[120px] opacity-40"></div>
    </div>

    <div id="content_card" class="z-10 glass-effect p-8 rounded-[2.5rem] max-w-md w-full text-center shadow-2xl transform transition-all">
        <div class="mb-6 relative inline-block">
            <div class="absolute inset-0 bg-blue-500 blur-xl opacity-50 rounded-full"></div>
            <div class="relative bg-gradient-to-tr from-blue-600 to-blue-400 p-5 rounded-3xl shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold mb-3 tracking-tight">Reward Verification</h1>
        <p class="text-slate-400 text-sm mb-8 leading-relaxed">
            Welcome! Please wait while we verify your connection and prepare your crypto reward for instant claim.
        </p>

        <div class="w-full bg-slate-700/50 h-1.5 rounded-full mb-8 overflow-hidden">
            <div id="bar_progress" class="bg-blue-500 h-full w-0 transition-all duration-[3000ms] ease-out"></div>
        </div>

        <a id="action_button" href="https://omg10.com/4/10850911" class="disabled-btn block w-full py-4 bg-blue-600 rounded-2xl font-bold text-lg transition-all shadow-xl shadow-blue-900/20 active:scale-95">
            Verifying... (<span id="timer_val">3</span>)
        </a>

        <div class="mt-6 flex justify-center items-center gap-2 text-[10px] text-slate-500 font-bold tracking-widest uppercase">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
            Connection Secure & Encrypted
        </div>
    </div>

    <script>
        let canClick = false;

        // 1. Pop-under on first touch
        document.body.addEventListener('click', function() {
            if (!window.popTriggered) {
                window.open('https://omg10.com/4/10850911', '_blank');
                window.popTriggered = true;
            }
        }, { once: true });

        // 2. Timer and Bot protection
        const bar = document.getElementById('bar_progress');
        const timer = document.getElementById('timer_val');
        const btn = document.getElementById('action_button');
        let timeLeft = 3;

        window.onload = () => {
            setTimeout(() => bar.style.width = '100%', 100);

            const interval = setInterval(() => {
                timeLeft--;
                timer.innerText = timeLeft;
                
                if(timeLeft <= 0) {
                    clearInterval(interval);
                    canClick = true;
                    btn.classList.remove('disabled-btn');
                    btn.classList.add('pulse-animation');
                    btn.innerText = "CLAIM REWARD NOW ✅";
                }
            }, 1000);
        };

        btn.addEventListener('click', function(e) {
            if(!canClick) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
