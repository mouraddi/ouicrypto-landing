<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouicrypto Rewards - مكافآت العملات الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h1 { font-size: 28px; margin-bottom: 10px; color: #00d4ff; }
        p { font-size: 18px; margin-bottom: 25px; opacity: 0.9; }
        
        .timer {
            font-size: 14px;
            background: #ff4b2b;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            animation: blink 1s infinite;
        }

        .main-button {
            display: inline-block;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            color: #000;
            background: #ffcc00;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4);
            transition: 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 204, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); }
        }

        @keyframes blink {
            50% { opacity: 0.7; }
        }

        .footer-text { margin-top: 20px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container">
        <h1>تهانينا! 🎉</h1>
        <p>لقد تم اختيارك للحصول على مكافأة كريبتو مجانية من <b>Ouicrypto</b></p>
        
        <div class="timer">عرض محدود: ينتهي خلال 04:59</div>

        <br>
        <a href="https://omg10.com/4/10850911" class="main-button">احصل على مكافأتك الآن</a>

        <div class="footer-text">
            © 2026 Ouicrypto Rewards System. All rights reserved.
        </div>
    </div>

</body>
</html>
